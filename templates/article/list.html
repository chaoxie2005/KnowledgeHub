<div class="row mb-2">
  {% for article in articles %}
    {# 阅读量 Top1 #}
    <div class="col-mb-6">
      <div class="row no-gutters border rounded overflow-hidden flex-md-row mb-4 shadow-sm h-md-250 position-relative" style="max-width: 100%; padding: 0;">
        <div class="col p-4 d-flex flex-column position-static" style="width: 100%;">
          <div class="article-tags">
            {% if article.tags.exists %}
              {% for tag in article.tags.all %}
                <span class="article-tag"><a href="#">{{ tag.name }}</a></span>
              {% endfor %}
            {% else %}
              <span class="no-tag">暂无标签</span>
            {% endif %}
          </div>
          <h3 class="mb-0">{{ article.title }}</h3>

          <div class="mb-1 text-muted">
            <a href="#" class="article-author">{{ article.author }}</a>
            <span class="article-time">| {{ article.published_time }}</span>
          </div>

          <p class="card-text mb-auto article-summary">{{ article.summary|truncatechars:100 }}</p>

          <a href="#" class="stretched-link read-more">继续阅读</a>
        </div>
      </div>
    </div>
  {% endfor %}
</div>
