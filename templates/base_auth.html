<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>超凡博客</title>

    <!-- Bootstrap core CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/authentication/base_auth.css' %}" />

    {% block style %} {# 自定义css #}
    {% endblock %}
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <main role="main" class="col-md-6 col-10 col-lg-4 offset-md-3 offset-1 offset-lg-4">
           {% block content %}
                写自己的表格
           {% endblock %}
        </main>
      </div>
    </div>

    <script src='{% static 'js/jquery.slim.min.js'%}'></script>
    <script src='{% static 'js/bootstrap.bundle.min.js'%}'></script>
    {% block js%}
    {% endblock %}
  </body>
</html>
